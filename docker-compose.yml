services:
  translategemma-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translategemma-ui
    restart: unless-stopped
    ports:
      - "7332:3000"
    environment:
      - NODE_ENV=production
      - LM_STUDIO_URL=http://192.168.1.42:1234
      - DEFAULT_MODEL=google/translategemma-27b-it
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
